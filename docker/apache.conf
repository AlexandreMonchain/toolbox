ServerName localhost

<VirtualHost *:80>
    DocumentRoot /app/public

    <Directory /app/public>
        # AllowOverride None : pas de .htaccess en prod (performance + sécurité)
        AllowOverride None
        Require all granted
        Options -Indexes -FollowSymLinks

        # Routing Symfony : tous les chemins non-fichier → index.php
        FallbackResource /index.php
    </Directory>

    # Bloquer l'accès aux fichiers sensibles dans public/
    <FilesMatch "\.(env|lock|json|xml|yaml|yml|md|sh)$">
        Require all denied
    </FilesMatch>

    # Bloquer les dotfiles
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Security headers (nécessite a2enmod headers)
    <IfModule mod_headers.c>
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
        # HSTS : activer après validation que le HTTPS fonctionne en prod
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

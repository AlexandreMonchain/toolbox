ServerName localhost

<VirtualHost *:8080>
    DocumentRoot /app/public

    <Directory /app/public>
        # AllowOverride None : pas de .htaccess en prod (performance + sécurité)
        AllowOverride None
        Require all granted
        Options -Indexes -FollowSymLinks

        # Routing Symfony : tous les chemins non-fichier → index.php
        FallbackResource /index.php
    </Directory>

    # Bloquer l'accès aux fichiers sensibles dans public/
    # (pas de .xml : /sitemap.xml est une route Symfony légitime, aucun .xml sensible dans public/)
    <FilesMatch "\.(env|lock|json|yaml|yml|md|sh)$">
        Require all denied
    </FilesMatch>

    # Bloquer les dotfiles
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Les security headers (CSP, X-Frame-Options, Referrer-Policy, HSTS, etc.)
    # sont gérés exclusivement par SecurityHeadersSubscriber.php — source unique de vérité.
    # Ne pas les redéfinir ici : Header always set écrase les valeurs PHP dans le filtre de sortie.

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
